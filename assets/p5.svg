<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1a12"/>
      <stop offset="100%" style="stop-color:#1a2215"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid decoration -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(201,168,76,0.04)" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(201,168,76,0.04)" stroke-width="1"/>
  <!-- Frame -->
  <rect x="60" y="60" width="680" height="480" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="1"/>
  <rect x="60" y="60" width="680" height="3" fill="url(#glow)"/>
  <!-- Rocket / Launch icon -->
  <!-- Rocket body -->
  <ellipse cx="400" cy="240" rx="35" ry="70" fill="none" stroke="rgba(201,168,76,0.55)" stroke-width="2.5"/>
  <!-- Rocket window -->
  <circle cx="400" cy="225" r="12" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
  <circle cx="400" cy="225" r="6" fill="rgba(201,168,76,0.2)"/>
  <!-- Rocket fins -->
  <polygon points="365,290 345,330 385,305" fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="2"/>
  <polygon points="435,290 455,330 415,305" fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="2"/>
  <!-- Exhaust flames -->
  <ellipse cx="400" cy="320" rx="18" ry="25" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <ellipse cx="400" cy="332" rx="10" ry="15" fill="rgba(201,168,76,0.2)"/>
  <!-- Stars -->
  <circle cx="160" cy="140" r="2" fill="rgba(201,168,76,0.5)"/>
  <circle cx="640" cy="140" r="2" fill="rgba(201,168,76,0.5)"/>
  <circle cx="180" cy="200" r="1.5" fill="rgba(201,168,76,0.35)"/>
  <circle cx="620" cy="190" r="1.5" fill="rgba(201,168,76,0.35)"/>
  <circle cx="140" cy="260" r="1" fill="rgba(201,168,76,0.3)"/>
  <circle cx="660" cy="250" r="1" fill="rgba(201,168,76,0.3)"/>
  <!-- Text -->
  <text x="400" y="410" font-family="Georgia, serif" font-size="14" fill="rgba(201,168,76,0.9)" text-anchor="middle" letter-spacing="4">LANÇAMENTO DE PRODUTO</text>
  <text x="400" y="440" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">LISANDRA EVENTOS · 2023</text>
  <text x="400" y="475" font-family="serif" font-size="16" fill="rgba(201,168,76,0.35)" text-anchor="middle">✦</text>
</svg>
