<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12100a"/>
      <stop offset="100%" style="stop-color:#201a08"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#center)"/>
  <!-- Ornate frame outer -->
  <rect x="60" y="60" width="680" height="480" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="1"/>
  <rect x="75" y="75" width="650" height="450" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="1"/>
  <rect x="60" y="60" width="680" height="3" fill="url(#glow)"/>
  <!-- Corner ornaments -->
  <text x="75" y="95" font-family="serif" font-size="20" fill="rgba(201,168,76,0.4)">✦</text>
  <text x="705" y="95" font-family="serif" font-size="20" fill="rgba(201,168,76,0.4)" text-anchor="end">✦</text>
  <text x="75" y="525" font-family="serif" font-size="20" fill="rgba(201,168,76,0.4)">✦</text>
  <text x="705" y="525" font-family="serif" font-size="20" fill="rgba(201,168,76,0.4)" text-anchor="end">✦</text>
  <!-- Crown icon -->
  <polygon points="310,200 360,240 400,190 440,240 490,200 475,290 325,290" fill="none" stroke="rgba(201,168,76,0.65)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="325" y="290" width="150" height="18" rx="2" fill="rgba(201,168,76,0.2)" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <!-- Crown jewels -->
  <circle cx="400" cy="205" r="8" fill="rgba(201,168,76,0.35)" stroke="rgba(201,168,76,0.6)" stroke-width="1"/>
  <circle cx="355" cy="238" r="5" fill="rgba(201,168,76,0.25)" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <circle cx="445" cy="238" r="5" fill="rgba(201,168,76,0.25)" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <!-- Divider line -->
  <line x1="200" y1="345" x2="600" y2="345" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <circle cx="400" cy="345" r="4" fill="rgba(201,168,76,0.4)"/>
  <!-- Text -->
  <text x="400" y="390" font-family="Georgia, serif" font-size="14" fill="rgba(201,168,76,0.9)" text-anchor="middle" letter-spacing="6">GALA PRIVADA VIP</text>
  <text x="400" y="420" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">LISANDRA EVENTOS · 2024</text>
  <text x="400" y="460" font-family="Georgia, serif" font-size="10" fill="rgba(201,168,76,0.5)" text-anchor="middle" letter-spacing="2">Experiência Ultra-Exclusiva</text>
</svg>
