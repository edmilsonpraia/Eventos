<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#spot)"/>
  <!-- Stage lights rays -->
  <line x1="400" y1="80" x2="150" y2="350" stroke="rgba(201,168,76,0.08)" stroke-width="40"/>
  <line x1="400" y1="80" x2="400" y2="400" stroke="rgba(201,168,76,0.06)" stroke-width="30"/>
  <line x1="400" y1="80" x2="650" y2="350" stroke="rgba(201,168,76,0.08)" stroke-width="40"/>
  <!-- Frame -->
  <rect x="60" y="60" width="680" height="480" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="1"/>
  <rect x="60" y="60" width="680" height="3" fill="url(#glow)"/>
  <!-- Microphone icon -->
  <rect x="375" y="190" width="50" height="90" rx="25" fill="none" stroke="rgba(201,168,76,0.6)" stroke-width="3"/>
  <rect x="383" y="198" width="34" height="74" rx="17" fill="rgba(201,168,76,0.08)"/>
  <!-- Mic lines detail -->
  <line x1="375" y1="235" x2="425" y2="235" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="375" y1="255" x2="425" y2="255" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <!-- Stand -->
  <path d="M 355 280 Q 400 310 445 280" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
  <line x1="400" y1="310" x2="400" y2="360" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
  <line x1="360" y1="360" x2="440" y2="360" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
  <!-- Sound waves -->
  <path d="M 450 215 Q 470 235 450 255" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="2"/>
  <path d="M 465 205 Q 495 235 465 265" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2"/>
  <path d="M 350 215 Q 330 235 350 255" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="2"/>
  <path d="M 335 205 Q 305 235 335 265" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="2"/>
  <!-- Stars/crowd dots -->
  <circle cx="200" cy="420" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="240" cy="440" r="2" fill="rgba(201,168,76,0.3)"/>
  <circle cx="280" cy="425" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="320" cy="445" r="2" fill="rgba(201,168,76,0.3)"/>
  <circle cx="360" cy="430" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="440" cy="430" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="480" cy="445" r="2" fill="rgba(201,168,76,0.3)"/>
  <circle cx="520" cy="425" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="560" cy="440" r="2" fill="rgba(201,168,76,0.3)"/>
  <circle cx="600" cy="420" r="2" fill="rgba(201,168,76,0.4)"/>
  <!-- Text -->
  <text x="400" y="395" font-family="Georgia, serif" font-size="14" fill="rgba(201,168,76,0.9)" text-anchor="middle" letter-spacing="5">SHOW AO VIVO</text>
  <text x="400" y="470" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">LISANDRA EVENTOS · 2023</text>
</svg>
