<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141010"/>
      <stop offset="100%" style="stop-color:#221a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </radialGradient>
    <linearGradient id="topglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Frame -->
  <rect x="40" y="40" width="520" height="720" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <rect x="40" y="40" width="520" height="3" fill="url(#topglow)"/>
  <!-- Corner ornaments -->
  <text x="50" y="72" font-family="serif" font-size="22" fill="rgba(201,168,76,0.45)">✦</text>
  <text x="530" y="72" font-family="serif" font-size="22" fill="rgba(201,168,76,0.45)" text-anchor="end">✦</text>
  <text x="50" y="755" font-family="serif" font-size="22" fill="rgba(201,168,76,0.45)">✦</text>
  <text x="530" y="755" font-family="serif" font-size="22" fill="rgba(201,168,76,0.45)" text-anchor="end">✦</text>
  <!-- Silhouette person/portrait -->
  <!-- Head -->
  <circle cx="300" cy="230" r="80" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="2"/>
  <circle cx="300" cy="230" r="70" fill="rgba(201,168,76,0.06)"/>
  <!-- Face features subtle -->
  <ellipse cx="275" cy="220" rx="8" ry="10" fill="rgba(201,168,76,0.2)"/>
  <ellipse cx="325" cy="220" rx="8" ry="10" fill="rgba(201,168,76,0.2)"/>
  <path d="M 275 260 Q 300 278 325 260" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
  <!-- Shoulders/body -->
  <path d="M 160 420 Q 180 340 300 330 Q 420 340 440 420 L 460 520 Q 300 560 140 520 Z" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.35)" stroke-width="2"/>
  <!-- Necklace detail -->
  <path d="M 255 340 Q 300 375 345 340" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <circle cx="300" cy="372" r="5" fill="rgba(201,168,76,0.4)" stroke="rgba(201,168,76,0.6)" stroke-width="1"/>
  <!-- Decorative lines -->
  <line x1="140" y1="600" x2="460" y2="600" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
  <circle cx="300" cy="600" r="4" fill="rgba(201,168,76,0.3)"/>
  <!-- Name and title -->
  <text x="300" y="650" font-family="Georgia, serif" font-size="22" fill="rgba(201,168,76,0.85)" text-anchor="middle" letter-spacing="3">Lisandra Francisco</text>
  <text x="300" y="680" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">FUNDADORA &amp; DIRECTORA</text>
  <text x="300" y="720" font-family="serif" font-size="13" fill="rgba(201,168,76,0.35)" text-anchor="middle" letter-spacing="2">✦  Lisandra Eventos  ✦</text>
</svg>
