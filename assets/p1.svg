<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2a2010"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(201,168,76,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  <!-- Frame -->
  <rect x="60" y="60" width="680" height="480" fill="none" stroke="rgba(201,168,76,0.18)" stroke-width="1"/>
  <!-- Building icon -->
  <rect x="310" y="180" width="180" height="160" fill="none" stroke="rgba(201,168,76,0.5)" stroke-width="2"/>
  <line x1="300" y1="180" x2="510" y2="180" stroke="rgba(201,168,76,0.4)" stroke-width="2"/>
  <!-- Windows -->
  <rect x="330" y="205" width="35" height="35" rx="2" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <rect x="383" y="205" width="35" height="35" rx="2" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <rect x="436" y="205" width="35" height="35" rx="2" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <!-- Door -->
  <rect x="375" y="285" width="50" height="55" rx="2" fill="rgba(201,168,76,0.2)" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <!-- Decorative top glow -->
  <rect x="60" y="60" width="680" height="3" fill="url(#glow)"/>
  <!-- Text -->
  <text x="400" y="410" font-family="Georgia, serif" font-size="14" fill="rgba(201,168,76,0.9)" text-anchor="middle" letter-spacing="5">EVENTO CORPORATIVO</text>
  <text x="400" y="440" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="4">LISANDRA EVENTOS · 2024</text>
  <text x="400" y="475" font-family="serif" font-size="16" fill="rgba(201,168,76,0.4)" text-anchor="middle">✦</text>
</svg>
